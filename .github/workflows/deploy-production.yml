name: Deploy to Cloud Run (Production POC-2)

on:
  push:
    branches:
      - main

env:
  GAR_LOCATION: us-west1
  SERVICE: bonded-poc-2-production
  REGION: us-west1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://bonded-poc-2-production.us-west1.run.app
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Create .env from template
        env:
          APP_ENV: ${{ vars.APP_ENV }}
          APP_VERSION: ${{ vars.APP_VERSION }}
        run: envsubst < .env.template > .env

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bonded-poc-2-staging/app:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/bonded-poc-2-staging/app:${{ github.sha }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          flags: "--allow-unauthenticated"